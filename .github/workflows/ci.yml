name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sdk-checks:
    name: JS SDK Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sdk-js/package-lock.json
      - name: Install dependencies
        run: cd sdk-js && npm ci --legacy-peer-deps
      - name: Build
        run: cd sdk-js && npm run build
      - name: Typecheck
        run: cd sdk-js && npm run typecheck
      - name: Run tests
        run: cd sdk-js && npm test

  frontend-lint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Lint frontend
        run: npm --prefix frontend run lint

  frontend-build:
    name: Frontend Production Build
    needs: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Performance budget check
        run: npm --prefix frontend run perf:check:ci
        continue-on-error: false
        env:
          CI: "true"

  frontend-tests:
    name: Frontend Unit Tests (${{ matrix.label }})
    needs: frontend-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: hooks
            suite: hooks
          - label: lib
            suite: lib
          - label: app
            suite: app
          - label: components (swap-card)
            suite: components/swap/SwapCard.test.tsx
          - label: components (swap)
            suite: components/swap
            exclude_args: --exclude '**/SwapCard.test.tsx'
          - label: components (shared)
            suite: components/shared
          - label: components (providers)
            suite: components/providers
          - label: components (settings)
            suite: components/settings
          - label: components (rest)
            suite: components
            exclude_args: >-
              --exclude 'components/swap/**'
              --exclude 'components/shared/**'
              --exclude 'components/providers/**'
              --exclude 'components/settings/**'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Run frontend tests
        run: |
          if [[ "${{ matrix.suite }}" == components* ]]; then
            npm --prefix frontend run test -- ${{ matrix.suite }} --pool=forks --maxWorkers=1 ${{ matrix.exclude_args }}
          else
            npm --prefix frontend run test -- ${{ matrix.suite }}
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          CI: "true"

  frontend-storybook:
    name: Frontend Ladle Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Build Ladle stories
        run: npm --prefix frontend run storybook:ci
      - name: Upload storybook build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ladle-storybook
          path: frontend/build/
          if-no-files-found: error
          retention-days: 7
